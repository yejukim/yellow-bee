<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice">
  <rect width="800" height="800" fill="#2E2D32"/>
  <defs>
    <radialGradient id="glow" cx="72%" cy="28%" r="65%">
      <stop offset="0%" stop-color="#FDC404" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FDC404" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shadow" cx="15%" cy="88%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="800" fill="url(#glow)"/>
  <rect width="800" height="800" fill="url(#shadow)"/>

  <!-- Honeycomb cluster, centered -->
  <g fill="none" stroke="#FDC404" stroke-width="2.5" transform="translate(328 308)">
    <polygon points="72,0 144,42 144,126 72,168 0,126 0,42" opacity="0.55"/>
    <polygon points="216,0 288,42 288,126 216,168 144,126 144,42" opacity="0.35"/>
    <polygon points="144,126 216,168 216,252 144,294 72,252 72,168" opacity="0.75"/>
  </g>

  <!-- Dot accent -->
  <g fill="#FDC404">
    <circle cx="392" cy="570" r="3"/>
    <circle cx="408" cy="570" r="3"/>
  </g>

  <!-- Label -->
  <g fill="#FDC404" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <text x="400" y="620" font-size="20" font-weight="700" letter-spacing="6">PHOTO</text>
    <text x="400" y="652" font-size="13" font-weight="500" letter-spacing="8" opacity="0.65">COMING SOON</text>
  </g>

  <!-- Hairline frame -->
  <rect x="28" y="28" width="744" height="744" fill="none" stroke="#FDC404" stroke-width="1" opacity="0.22"/>
</svg>
